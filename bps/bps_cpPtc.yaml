includeConfigs:
  - ${PWD}/bps/bps_qgraph_options.yaml
  - ${PWD}/bps/bps_parsl_config.yaml

isrTaskName: cpPtcIsr
extraQgraphOptions: "{isr_QgraphOptions} --config cpPtcIsr:doDeferredCharge=False --config cpPtcExtractPair:doExtractPhotodiodeData=False --config cpPtcSolve:maxDeltaInitialPtcOutlierFit=10000"

pipelineYaml: "${IMSIM_UTILS_DIR}/pipelines/cpPtc.yaml"
instrument: ${INSTRUMENT_CLASS}

